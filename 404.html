<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#7d65e1" />
    <meta http-equiv="refresh" content="2;url=https://pokemonbuilder.app/" />
    <link rel="canonical" href="https://pokemonbuilder.app/" />
    <link rel="icon" href="/pokemonTeamBuilder/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/pokemonTeamBuilder/favicon-32x32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/pokemonTeamBuilder/apple-touch-icon.png" />
    <title>Pokemon Team Builder moved</title>
    <style>
      :root {
        color-scheme: dark;
        --text: #f8fafc;
        --muted: #b8c0d4;
        --primary: #7d65e1;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(125, 101, 225, 0.26), transparent 32rem),
          linear-gradient(145deg, #10131f 0%, #171b2b 54%, #0d111c 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 28rem);
        padding: 2rem;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.25rem;
        background: rgba(23, 27, 43, 0.82);
        box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(18px);
      }

      img {
        width: 6rem;
        height: auto;
        margin-bottom: 1.25rem;
        filter: drop-shadow(0 1rem 1.5rem rgba(0, 0, 0, 0.35));
      }

      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 7vw, 2.35rem);
        line-height: 1.05;
      }

      p {
        margin: 0.9rem 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      .spinner {
        width: 2.4rem;
        height: 2.4rem;
        margin: 1.5rem auto 1.25rem;
        border-radius: 999px;
        border: 0.22rem solid rgba(255, 255, 255, 0.16);
        border-top-color: var(--accent);
        animation: spin 0.8s linear infinite;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        margin-top: 0.35rem;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        background: var(--primary);
        color: white;
        font-weight: 800;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 3px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <main aria-live="polite">
      <img src="/pokemonTeamBuilder/LogoCuteGengarRounded.png" alt="Pokemon Team Builder" />
      <h1>Pokemon Team Builder moved</h1>
      <p>Redirecting you to the new home at pokemonbuilder.app.</p>
      <div class="spinner" aria-hidden="true"></div>
      <a id="fallback-link" href="https://pokemonbuilder.app/">Open PokemonBuilder.app</a>
    </main>
    <script>
      const targetOrigin = 'https://pokemonbuilder.app';
      const oldBase = '/pokemonTeamBuilder';
      const path = window.location.pathname.startsWith(oldBase)
        ? window.location.pathname.slice(oldBase.length) || '/'
        : '/';
      const targetUrl = new URL(path, targetOrigin);
      targetUrl.search = window.location.search;
      targetUrl.hash = window.location.hash;
      document.getElementById('fallback-link').href = targetUrl.href;
      window.setTimeout(() => window.location.replace(targetUrl.href), 700);
    </script>
  </body>
</html>
